name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New Node Type
        - New Action
        - Graph Editor UX
        - Pie Menu UX
        - Quick Menu Panel
        - Python / Scripting
        - Compatibility
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
      placeholder: "I'd like a Sequencer action that toggles auto-key mode..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What workflow would this improve? How do you currently work around it?
      placeholder: "When I'm animating in Sequencer, I constantly need to toggle auto-key. Currently I have to reach for the toolbar button..."
    validations:
      required: true
