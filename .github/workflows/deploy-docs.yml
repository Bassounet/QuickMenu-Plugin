name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Copy llms files to docs output
        run: |
          mkdir -p site
          cp llms.txt docs/llms.txt 2>/dev/null || true
          cp llms-full.txt docs/llms-full.txt 2>/dev/null || true

      - name: Build documentation
        run: mkdocs build --strict

      - name: Copy llms files to site root
        run: |
          cp llms.txt site/llms.txt 2>/dev/null || true
          cp llms-full.txt site/llms-full.txt 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
