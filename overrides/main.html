{% extends "base.html" %}

{% block content %}
  {% if page.previous_page or page.next_page %}
  <nav class="md-top-pager" aria-label="Page navigation">
    {% if page.previous_page %}
    <a href="{{ page.previous_page.url | url }}" class="md-top-pager__link md-top-pager__link--prev">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M20 11v2H8l5.5 5.5-1.42 1.42L4.16 12l7.92-7.92L13.5 5.5 8 11z"></path></svg>
      <span>{{ page.previous_page.title }}</span>
    </a>
    {% endif %}
    {% if page.next_page %}
    <a href="{{ page.next_page.url | url }}" class="md-top-pager__link md-top-pager__link--next">
      <span>{{ page.next_page.title }}</span>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M4 11v2h12l-5.5 5.5 1.42 1.42L19.84 12l-7.92-7.92L10.5 5.5 16 11z"></path></svg>
    </a>
    {% endif %}
  </nav>
  {% endif %}
  {{ super() }}
{% endblock %}
